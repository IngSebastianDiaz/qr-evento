<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conciencia QR</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #000000, #1a1a1a, #300000, #000000);
            background-size: 400% 400%;
            animation: fondoAnimado 12s ease infinite;
        }

        @keyframes fondoAnimado {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,0,0,0.15), rgba(0,0,0,0.9));
            pointer-events: none;
        }

       .container {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}


      img {
    max-width: 90vw;   /* 🔥 nunca más ancho que la pantalla */
    max-height: 90vh;  /* 🔥 nunca más alto que la pantalla */
    object-fit: contain;

    box-shadow: 0 0 40px rgba(255, 0, 0, 0.5); /* bajamos intensidad */
    border-radius: 10px;
}

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body>

    <div class="overlay"></div>

    <div class="container">
        <img src="https://raw.githubusercontent.com/IngSebastianDiaz/qr-evento/main/Esto%20pudo%20ser%20un%20ataque.png" alt="Conciencia QR">
    </div>

</body>
</html>
