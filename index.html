<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bienvenido</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;

            background: linear-gradient(-45deg, #000000, #1a1a1a, #d32f2f, #000000);
            background-size: 400% 400%;
            animation: fondoAnimado 10s ease infinite;
        }

        @keyframes fondoAnimado {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            animation: fadeIn 2s ease;
        }

        h1 {
            font-size: 3em;
            text-shadow: 0 0 20px red;
        }

        p {
            font-size: 1.2em;
            opacity: 0.8;
        }

        .contador {
            font-size: 2em;
            margin-top: 15px;
            color: #ff5252;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #d32f2f;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #ff5252;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>

    <script>
        let tiempo = 3;

        function actualizarContador() {
            document.getElementById("contador").innerText = tiempo;
            tiempo--;

            if (tiempo < 0) {
                window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
            }
        }

        setInterval(actualizarContador, 1000);

        function irAhora() {
            window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
        }
    </script>
</head>

<body>
    <div class="container">
        <h1>😏 Bienvenido a la trampa</h1>
        <p>Prepárate... algo inesperado está por suceder</p>

        <div class="contador">
            Redirigiendo en <span id="contador">5</span>...
        </div>

       
    </div>
</body>
</html>
